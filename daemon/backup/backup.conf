# ═══════════════════════════════════════════════════════════
#  Arch Backup Configuration
#  Edit these lists to control what gets backed up/restored
# ═══════════════════════════════════════════════════════════

# Timezone (used during restore)
TIMEZONE="Europe/Madrid"

# Max backups to keep on target (oldest pruned first)
MAX_BACKUPS=3

# ── System config files to back up from /etc ─────────────
ETC_FILES=(
    pacman.conf
    pacman.d/mirrorlist
    fstab
    hostname
    hosts
    locale.conf
    locale.gen
    vconsole.conf
    mkinitcpio.conf
    default/grub
    makepkg.conf
    environment
)

# ── System config directories to back up from /etc ───────
ETC_DIRS=(
    modprobe.d
    sysctl.d
    X11/xorg.conf.d
    udev/rules.d
)

# ── Shell dotfiles from $HOME ────────────────────────────
DOTFILES=(
    .zshrc
    .bashrc
    .bash_profile
    .zsh_history
    .gitconfig
)

# ── ~/.config directories/files to back up ───────────────
# (skip bloated/regeneratable: vesktop, mozilla, chrome, CurseForge)
CONFIG_ITEMS=(
    kitty
    fastfetch
    exocortex
    obs-studio
    spicetify
    Kvantum
    OpenRGB
    fcitx5
    gtk-3.0
    gtk-4.0
    nvim
    btop
    rice-rollback-copperforge-2026-02-13
)

# ── KDE config globs (top-level files in ~/.config) ──────
# These are matched with: ~/.config/k*rc ~/.config/plasma*
# Handled separately to avoid duplication with CONFIG_ITEMS
KDE_GLOBS=(
    "k*rc"
    "plasma*"
)

# ── Home directories to back up ──────────────────────────
DATA_DIRS=(
    university
    website
    Exocortex
    sauron
    Documents
    Desktop
    Pictures
    tbdchat
    Vencord
    arrpc
    msc-mods
    MSCLoader
    Themes
)

# ── rsync exclude patterns for data dirs ─────────────────
RSYNC_EXCLUDES=(
    node_modules
    .git
    __pycache__
    .next
    dist
    .venv
    venv
)

# ── System services that are always enabled by default ───
# (skipped during restore to avoid noise)
DEFAULT_SERVICES=(
    getty@.service
    systemd-timesyncd.service
    systemd-userdbd.socket
    remote-fs.target
    dbus-org.bluez.service
    dbus-org.freedesktop.nm-dispatcher.service
    dbus-org.freedesktop.timesync1.service
    display-manager.service
)
